name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Pack
        run: |
          dotnet pack src/Mediarq.Core/Mediarq.Core.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/Mediarq/Mediarq.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/Mediarq.AspNetCore/Mediarq.AspNetCore.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/Mediarq.FluentValidation/Mediarq.FluentValidation.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/Mediarq.MassTransit/Mediarq.MassTransit.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/Mediarq.Caching/Mediarq.Caching.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/Mediarq.Diagnostics/Mediarq.Diagnostics.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/Mediarq.UnitOfWork/Mediarq.UnitOfWork.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts
          dotnet pack src/Mediarq.Polly/Mediarq.Polly.csproj --no-build -c Release -p:Version=${{ steps.version.outputs.version }} -o ./artifacts

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
