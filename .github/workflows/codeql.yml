name: "CodeQL"

# Static analysis (GitHub code scanning). Producing CodeQL results satisfies
# the branch/ruleset "Require code scanning results" protection on main/dev.
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    # Weekly scan (Mondays 03:27 UTC) to catch newly disclosed rules.
    - cron: '27 3 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # C# analyzed without a build (build-mode: none) — no .NET SDK setup
          # or multi-target build required.
          - language: csharp
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
