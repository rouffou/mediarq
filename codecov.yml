coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 2%

comment:
  layout: "reach, diff, flags, files"
  require_changes: true

ignore:
  - "Samples/**"
  - "benchmarks/**"
  - "templates/**"
  - "Tests/**"
